<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0f1115">
<title>Rota</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #171a21;
    --panel-2: #1e222b;
    --border: #2a2f3a;
    --text: #e6e8ee;
    --muted: #8a92a3;
    --accent: #4f8cff;
    --morning: #f5b458;
    --evening: #7a5bd9;
    --allday: #3ec28f;
    --danger: #e5484d;
    --sub-early: #6b6b2d;
    --sub-covering: #8b5a3c;
    --sub-unfilled: #a83232;
    --sub-alternating: #3d5a80;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    width: 100vw; height: 100dvh;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: clamp(10px, 1.35vmin, 16px);
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  #app { display: flex; width: 100%; height: 100%; }

  /* LEFT PANE (20%) */
  #left {
    flex: 0 0 20%;
    display: flex; flex-direction: column;
    background: var(--panel);
    border-right: 1px solid var(--border);
    min-width: 0;
    transition: transform 0.3s ease;
  }
  #left.hidden { transform: translateX(-100%); position: absolute; }
  #app.view-only #left { display: none; }
  #app.view-only #right { border-left: none; }
  #left header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.5em 0.6em;
    border-bottom: 1px solid var(--border);
    gap: 0.4em;
    flex-wrap: wrap;
  }
  #left header h1 { margin: 0; font-size: 1.1em; font-weight: 600; letter-spacing: 0.02em; }
  #sort-select {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border);
    padding: 0.3em 0.5em;
    border-radius: 0.3em;
    font-size: 0.8em;
    cursor: pointer;
    outline: none;
  }
  #sort-select:focus { border-color: var(--accent); }
  .icon-btn {
    background: var(--accent); color: white;
    border: none; border-radius: 50%;
    width: 1.8em; height: 1.8em;
    font-size: 1.2em; line-height: 1;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .icon-btn:hover { filter: brightness(1.1); }

  .toggle-view-btn {
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border);
    padding: 0.4em 0.7em;
    border-radius: 0.3em;
    cursor: pointer;
    font-size: 0.85em;
    font-weight: 500;
    white-space: nowrap;
    position: absolute;
    top: 0.5em;
    right: 0.6em;
    z-index: 100;
  }
  .toggle-view-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
  #app.view-only .toggle-view-btn { left: 0.6em; right: auto; }

  .action-buttons {
    display: flex; gap: 0.4em; padding: 0.5em 0.6em;
    border-top: 1px solid var(--border);
  }
  .action-btn {
    flex: 1;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border);
    padding: 0.5em;
    border-radius: 0.3em;
    cursor: pointer;
    font-size: 0.8em;
    font-weight: 500;
    text-align: center;
  }
  .action-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }

  #text-summary {
    display: none;
    padding: 0.6em;
    overflow-y: auto;
    font-size: 0.85em;
    line-height: 1.5;
  }
  #text-summary.show { display: block; }
  #text-summary .summary-item {
    margin-bottom: 0.5em;
    padding-bottom: 0.5em;
    border-bottom: 1px solid var(--border);
  }
  #text-summary .summary-item:last-child { border-bottom: none; }
  #text-summary .summary-name { font-weight: 600; color: var(--accent); }
  #text-summary .summary-stats { color: var(--muted); font-size: 0.95em; margin-left: 0.5em; }

  #people {
    flex: 1; min-height: 0;
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 0.4em; padding: 0.4em;
    overflow-y: auto;
    align-content: start;
  }
  .person {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 0.4em;
    padding: 0.4em 0.5em;
    display: flex; flex-direction: column; gap: 0.15em;
    cursor: grab;
    position: relative;
    touch-action: none;
    min-width: 0;
  }
  .person:active { cursor: grabbing; }
  .person.dragging { opacity: 0.35; }
  .person .name {
    font-weight: 600; font-size: 0.9em;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    padding-right: 1em;
    text-align: left;
  }
  .person .shifts-total {
    font-size: 0.85em;
    text-align: right;
    color: var(--accent);
    font-weight: 600;
  }
  .person .breakdown {
    font-size: 0.75em;
    color: var(--muted);
    text-align: right;
  }
  .person .hours {
    font-size: 0.8em;
    color: var(--text);
    text-align: right;
    font-weight: 500;
  }
  .person .del {
    position: absolute; top: 0.2em; right: 0.25em;
    background: transparent; border: none; color: var(--muted);
    font-size: 0.9em; cursor: pointer; line-height: 1;
    padding: 0.1em 0.3em;
  }
  .person .del:hover { color: var(--danger); }

  #legend {
    padding: 0.6em 0.7em;
    border-top: 1px solid var(--border);
    font-size: 0.85em;
    color: var(--muted);
    display: flex;
    flex-direction: column;
    gap: 0.6em;
  }
  #legend .section {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 0.3em;
    padding: 0.5em;
  }
  #legend .section-title {
    font-weight: 600;
    margin-bottom: 0.4em;
    color: var(--text);
    font-size: 0.9em;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    opacity: 0.8;
  }
  #legend .shifts-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.5em;
  }
  #legend .shift-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3em;
    text-align: center;
  }
  #legend .shift-col .shift-label {
    font-weight: 500;
    color: var(--text);
  }
  #legend .shift-col .shift-time {
    font-size: 0.85em;
    color: var(--muted);
  }
  #legend .subtypes-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5em;
    align-items: center;
  }
  #legend .subtype-item {
    display: flex; align-items: center; gap: 0.5em;
    white-space: nowrap;
  }
  #legend .badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 1.8em; height: 1.8em;
    border-radius: 0.25em;
    font-weight: 700; font-size: 0.9em;
    flex-shrink: 0;
  }
  #legend .badge.m { background: var(--morning); color: #1a1410; }
  #legend .badge.e { background: var(--evening); color: #1a0f28; }
  #legend .badge.ad { background: var(--allday); color: #0a1410; }
  #legend .color-square {
    width: 1.2em; height: 1.2em;
    border-radius: 0.2em;
    flex-shrink: 0;
  }
  #legend .sq-early { background: var(--sub-early); }
  #legend .sq-covering { background: var(--sub-covering); }
  #legend .sq-unfilled { background: var(--sub-unfilled); }
  #legend .sq-alternating { background: var(--sub-alternating); }

  #clear-all {
    padding: 0.4em 0.6em;
    border-top: 1px solid var(--border);
    color: var(--muted); font-size: 0.75em;
    text-align: center; cursor: pointer;
  }
  #clear-all:hover { color: var(--danger); }

  /* RIGHT PANE (80%) */
  #right {
    flex: 1; min-width: 0;
    display: grid;
    grid-template-columns: auto repeat(7, 1fr);
    grid-template-rows: auto repeat(6, 1fr);
    gap: 2px;
    background: var(--border);
    padding: 2px;
    position: relative;
  }
  .corner, .day-header, .role-label {
    background: var(--panel);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600;
    padding: 0.3em 0.4em;
    font-size: 0.95em;
  }
  .role-label { padding: 0 0.5em; white-space: nowrap; }

  .cell {
    background: var(--panel-2);
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 0.25em;
    padding: 0.3em;
    min-width: 0; min-height: 0;
    transition: background 0.15s;
  }
  .cell.overflow { grid-template-rows: 1fr 1fr 1fr; }
  .cell.drag-over { background: #2b3446; }
  .cell.shake { animation: shake 0.3s; }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .slot {
    border: 1px dashed #2a3038;
    border-radius: 0.25em;
    position: relative;
  }
  .slot.drop-target { background: rgba(79, 140, 255, 0.1); border-color: var(--accent); }
  .mini {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 0.3em;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    cursor: grab;
    min-width: 0;
    min-height: 0;
    touch-action: none;
    transition: transform 0.1s, box-shadow 0.1s;
    position: relative;
  }
  .mini:hover { transform: translateY(-1px); box-shadow: 0 2px 8px rgba(0,0,0,0.4); }
  .mini:active { cursor: grabbing; }
  .mini.dragging { opacity: 0.35; }

  .mini .m-name {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0.2em 0.3em;
    font-weight: 600;
    font-size: 0.85em;
    text-align: center;
    overflow: hidden;
    line-height: 1.1;
    gap: 0.1em;
  }

  .mini .m-first,
  .mini .m-last {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
  }

  .mini .m-last {
    font-weight: 500;
    opacity: 0.85;
  }

  .mini .m-badge-strip {
    flex: 0 0 1.6em;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 0.75em;
    letter-spacing: 0.05em;
    position: relative;
    overflow: hidden;
  }

  .mini.morning .m-badge-strip {
    background: var(--morning);
    color: #1a1410;
  }
  .mini.evening .m-badge-strip {
    background: var(--evening);
    color: #1a0f28;
  }
  .mini.allday {
    grid-row: span 2;
  }
  .mini.allday .m-badge-strip {
    background: var(--allday);
    color: #0a1410;
  }

  /* Diagonal sub-type indicator */
  .mini .m-badge-strip::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 30%;
    clip-path: polygon(30% 0, 100% 0, 100% 100%, 0 100%);
    pointer-events: none;
  }

  .mini.sub-early .m-badge-strip::after { background: var(--sub-early); }
  .mini.sub-covering .m-badge-strip::after { background: var(--sub-covering); }
  .mini.sub-unfilled .m-badge-strip::after { background: var(--sub-unfilled); }
  .mini.sub-alternating .m-badge-strip::after { background: var(--sub-alternating); }

  /* Drag ghost */
  #drag-ghost {
    position: fixed; pointer-events: none;
    opacity: 0.85; z-index: 1000;
    transform: translate(-50%, -50%);
    background: var(--panel-2);
    border: 1px solid var(--accent);
    border-radius: 0.5em;
    padding: 0.4em 0.8em;
    font-weight: 600;
    font-size: 1em;
    display: none;
    white-space: nowrap;
    box-shadow: 0 6px 18px rgba(0,0,0,0.5);
  }

  /* Popover */
  #popover {
    position: fixed; z-index: 1100;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 0.5em;
    padding: 0.6em;
    box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    display: none;
    flex-direction: column;
    gap: 0.5em;
    min-width: 12em;
  }
  #popover.show { display: flex; }
  #popover .pop-section {
    display: flex;
    flex-direction: column;
    gap: 0.3em;
  }
  #popover .pop-label {
    font-size: 0.75em;
    color: var(--muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  #popover .pop-buttons {
    display: flex;
    gap: 0.3em;
  }
  #popover button {
    background: var(--panel);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 0.5em 0.8em;
    border-radius: 0.3em;
    cursor: pointer;
    font-size: 0.85em;
    font-weight: 500;
    flex: 1;
  }
  #popover button:hover { background: var(--accent); color: white; border-color: var(--accent); }
  #popover button.selected { background: var(--accent); color: white; border-color: var(--accent); }
  #popover .pop-confirm {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    margin-top: 0.3em;
  }

  /* Name modal */
  #name-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center; justify-content: center;
    z-index: 1200;
  }
  #name-modal.show { display: flex; }
  #name-modal .dialog {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 0.5em;
    padding: 1em 1.1em;
    min-width: 16em;
    display: flex; flex-direction: column; gap: 0.6em;
  }
  #name-modal label { font-size: 0.9em; color: var(--muted); }
  #name-modal input {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border);
    border-radius: 0.3em;
    padding: 0.5em 0.6em;
    font-size: 1em;
    outline: none;
  }
  #name-modal input:focus { border-color: var(--accent); }
  #name-modal .btn-row { display: flex; gap: 0.5em; justify-content: flex-end; }
  #name-modal button {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border);
    padding: 0.45em 0.9em; border-radius: 0.3em;
    cursor: pointer; font-size: 0.9em;
  }
  #name-modal button.primary {
    background: var(--accent); border-color: var(--accent); color: white;
  }

  /* Save/Load modal */
  #save-modal {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center; justify-content: center;
    z-index: 1200;
  }
  #save-modal.show { display: flex; }
  #save-modal .dialog {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 0.5em;
    padding: 1em 1.1em;
    min-width: 20em;
    max-width: 90vw;
    display: flex; flex-direction: column; gap: 0.6em;
  }
  #save-modal textarea {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border);
    border-radius: 0.3em;
    padding: 0.5em 0.6em;
    font-size: 0.85em;
    font-family: monospace;
    resize: vertical;
    min-height: 8em;
    outline: none;
  }
  #save-modal textarea:focus { border-color: var(--accent); }
  #save-modal .btn-row { display: flex; gap: 0.5em; justify-content: flex-end; }
  #save-modal button {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--border);
    padding: 0.45em 0.9em; border-radius: 0.3em;
    cursor: pointer; font-size: 0.9em;
  }
  #save-modal button.primary {
    background: var(--accent); border-color: var(--accent); color: white;
  }
</style>
</head>
<body>
<div id="app">
  <button class="toggle-view-btn" id="toggle-view">View Rota Only</button>
  <aside id="left">
    <header>
      <h1>Rota</h1>
      <select id="sort-select">
        <option value="name">Sort: Name</option>
        <option value="shifts">Sort: Shifts</option>
        <option value="hours">Sort: Hours</option>
      </select>
      <button class="icon-btn" id="add-btn" title="Add person" aria-label="Add person">+</button>
    </header>
    <div id="people"></div>
    <div id="text-summary"></div>
    <div id="legend">
      <div class="section">
        <div class="section-title">Shift Types</div>
        <div class="shifts-row">
          <div class="shift-col">
            <span class="badge m">M</span>
            <span class="shift-label">Morning</span>
            <span class="shift-time">Start - 16:00</span>
          </div>
          <div class="shift-col">
            <span class="badge e">E</span>
            <span class="shift-label">Evening</span>
            <span class="shift-time">16:00 - Close</span>
          </div>
          <div class="shift-col">
            <span class="badge ad">AD</span>
            <span class="shift-label">All Day</span>
            <span class="shift-time">Start - Close</span>
          </div>
        </div>
      </div>
      <div class="section">
        <div class="section-title">Modifiers</div>
        <div class="subtypes-grid">
          <div class="subtype-item"><span class="color-square sq-early"></span> May leave early</div>
          <div class="subtype-item"><span class="color-square sq-covering"></span> Covering</div>
          <div class="subtype-item"><span class="color-square sq-unfilled"></span> Unfilled Shift</div>
          <div class="subtype-item"><span class="color-square sq-alternating"></span> Alternating</div>
        </div>
      </div>
    </div>
    <div class="action-buttons">
      <button class="action-btn" id="save-btn">Save</button>
      <button class="action-btn" id="load-btn">Load</button>
      <button class="action-btn" id="download-btn">Download</button>
    </div>
    <div id="clear-all">Clear all assignments</div>
  </aside>
  <main id="right"></main>
</div>

<div id="drag-ghost"></div>

<div id="popover">
  <div class="pop-section">
    <div class="pop-label">Shift Type</div>
    <div class="pop-buttons">
      <button data-shift="morning">Morning</button>
      <button data-shift="evening">Evening</button>
      <button data-shift="allday">All Day</button>
    </div>
  </div>
  <div class="pop-section">
    <div class="pop-label">Sub-Type (Optional)</div>
    <div class="pop-buttons">
      <button data-subtype="early">Early</button>
      <button data-subtype="covering">Covering</button>
      <button data-subtype="unfilled">Unfilled</button>
      <button data-subtype="alternating">Alt.</button>
    </div>
  </div>
  <button class="pop-confirm" id="pop-confirm">Add</button>
</div>

<div id="name-modal">
  <div class="dialog">
    <label for="name-input">Person's name</label>
    <input id="name-input" type="text" autocomplete="off" spellcheck="false" />
    <div class="btn-row">
      <button id="name-cancel">Cancel</button>
      <button id="name-ok" class="primary">Add</button>
    </div>
  </div>
</div>

<div id="save-modal">
  <div class="dialog">
    <label for="save-data">Save code (copy and share):</label>
    <textarea id="save-data" readonly></textarea>
    <div class="btn-row">
      <button id="copy-btn" class="primary">Copy to Clipboard</button>
      <button id="save-close">Close</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script>
(() => {
'use strict';

const DAYS  = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
const ROLES = ['Fryer','Takeaway','Restaurant','Extra','Kitchen','New Side'];
const CELL_MAX = 6;
const STORAGE_KEY = 'rota-v1';

const DEFAULT_PEOPLE = [
  'Alix Murton', 'Brooke Messrutner', 'David Zocchi', 'Donna Coe', 'Donna Ball',
  'Ellie Hollis', 'Evie Hollis', 'Gail Harris', 'Jay Tyler', 'Jayden Wilks',
  'Jesse Fisk', 'Julie Waller', 'Kadie Hollingsworth', 'Karen Pickering', 'Kim Carter',
  'Lorraine Butcher', 'Melissa Burton', 'Nicola Willis', 'Pauline Cheetham',
  'Ruby Bright', 'Shauna Hill'
];

function hoursFor(shift, dayIdx) {
  const longDay = (dayIdx === 4 || dayIdx === 5);
  if (shift === 'morning') return 5;
  if (shift === 'evening') return longDay ? 5 : 4;
  if (shift === 'allday')  return longDay ? 10 : 9;
  return 0;
}

let state = { people: [], assignments: [] };

function load() {
  try {
    const s = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (s && Array.isArray(s.people) && Array.isArray(s.assignments)) {
      state = s;
      ensureDefaultPeople();
    } else {
      initDefaultPeople();
    }
  } catch (e) {
    initDefaultPeople();
  }
}

function initDefaultPeople() {
  state.people = DEFAULT_PEOPLE.map(name => ({ id: uid(), name }));
  state.assignments = [];
  save();
}

function ensureDefaultPeople() {
  const existingNames = new Set(state.people.map(p => p.name.toLowerCase()));
  let added = false;

  for (const name of DEFAULT_PEOPLE) {
    if (!existingNames.has(name.toLowerCase())) {
      state.people.push({ id: uid(), name });
      added = true;
    }
  }

  if (added) save();
}
function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }
function uid() { return Math.random().toString(36).slice(2, 10); }

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

function statsFor(personId) {
  let morning = 0, evening = 0, allday = 0, hours = 0;
  for (const a of state.assignments) {
    if (a.personId !== personId) continue;
    if (a.shift === 'morning') morning++;
    else if (a.shift === 'evening') evening++;
    else if (a.shift === 'allday')  allday++;
    hours += hoursFor(a.shift, a.day);
  }
  const shifts = allday + 0.5 * (morning + evening);
  return { morning, evening, allday, hours, shifts };
}

let sortMode = 'name';

function renderPeople() {
  const el = document.getElementById('people');
  el.innerHTML = '';

  let sorted = [...state.people];
  if (sortMode === 'name') {
    sorted.sort((a, b) => a.name.localeCompare(b.name));
  } else if (sortMode === 'shifts') {
    sorted.sort((a, b) => statsFor(b.id).shifts - statsFor(a.id).shifts);
  } else if (sortMode === 'hours') {
    sorted.sort((a, b) => statsFor(b.id).hours - statsFor(a.id).hours);
  }

  for (const p of sorted) {
    const s = statsFor(p.id);
    const div = document.createElement('div');
    div.className = 'person';
    div.dataset.personId = p.id;
    div.innerHTML = `
      <button class="del" title="Remove" aria-label="Remove person">&times;</button>
      <div class="name">${escapeHtml(p.name)}</div>
      <div class="shifts-total">${s.shifts.toFixed(1)} Shifts</div>
      <div class="breakdown">AD: ${s.allday} / M: ${s.morning} / E: ${s.evening}</div>
      <div class="hours">${s.hours} Hours</div>
    `;
    div.querySelector('.del').addEventListener('click', (e) => {
      e.stopPropagation();
      if (confirm(`Remove ${p.name}?`)) removePerson(p.id);
    });
    attachDrag(div, p);
    el.appendChild(div);
  }
}

function renderGrid() {
  const el = document.getElementById('right');
  el.innerHTML = '';
  const corner = document.createElement('div');
  corner.className = 'corner';
  el.appendChild(corner);
  for (const d of DAYS) {
    const h = document.createElement('div');
    h.className = 'day-header';
    h.textContent = d;
    el.appendChild(h);
  }
  for (let r = 0; r < ROLES.length; r++) {
    const rl = document.createElement('div');
    rl.className = 'role-label';
    rl.textContent = ROLES[r];
    el.appendChild(rl);
    for (let d = 0; d < DAYS.length; d++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.day = d;
      cell.dataset.role = r;
      renderCell(cell, d, r);
      el.appendChild(cell);
    }
  }
}

function renderCell(cell, day, role) {
  cell.innerHTML = '';
  const assigns = state.assignments
    .filter(a => a.day === day && a.role === role)
    .sort((a, b) => (a.position || 0) - (b.position || 0));
  const count = assigns.length;
  const slots = count > 4 ? CELL_MAX : 4;
  cell.classList.toggle('overflow', slots === CELL_MAX);

  // Create a map of position -> assignment
  const positionMap = {};
  assigns.forEach(a => positionMap[a.position || 0] = a);

  for (let i = 0; i < slots; i++) {
    const a = positionMap[i];
    if (a) {
      const person = state.people.find(p => p.id === a.personId);
      if (!person) continue;
      const m = document.createElement('div');
      m.className = 'mini ' + a.shift;
      if (a.subType) m.classList.add('sub-' + a.subType);
      m.dataset.assignmentId = a.id;
      m.dataset.position = i;

      const nameParts = person.name.trim().split(/\s+/);
      const firstName = nameParts[0] || '';
      const lastName = nameParts.slice(1).join(' ') || '';
      const badge = a.shift === 'allday' ? 'AD' : (a.shift === 'morning' ? 'M' : 'E');

      m.innerHTML = `
        <div class="m-name">
          <div class="m-first">${escapeHtml(firstName)}</div>
          <div class="m-last">${escapeHtml(lastName)}</div>
        </div>
        <div class="m-badge-strip">${badge}</div>
      `;
      const subTypeText = a.subType ? ` (${a.subType})` : '';
      m.title = `${person.name} — ${a.shift}${subTypeText} (drag to move, click to remove)`;
      m.addEventListener('click', (e) => {
        if (!drag) removeAssignment(a.id);
      });
      attachMiniDrag(m, a, person, day, role);
      cell.appendChild(m);
    } else {
      const slot = document.createElement('div');
      slot.className = 'slot';
      slot.dataset.position = i;
      cell.appendChild(slot);
    }
  }
}

function rerenderCell(day, role) {
  const cell = document.querySelector(`.cell[data-day="${day}"][data-role="${role}"]`);
  if (cell) renderCell(cell, day, role);
}

function addPerson(name) {
  const n = name.trim();
  if (!n) return;
  state.people.push({ id: uid(), name: n });
  save(); renderPeople();
}
function removePerson(personId) {
  state.people = state.people.filter(p => p.id !== personId);
  state.assignments = state.assignments.filter(a => a.personId !== personId);
  save(); renderPeople(); renderGrid();
}
function addAssignment(personId, day, role, shift, position, subType) {
  const cellAssignments = state.assignments.filter(a => a.day === day && a.role === role);
  const count = cellAssignments.length;
  if (count >= CELL_MAX) { shakeCell(day, role); return false; }

  // If position not specified, auto-assign to first available slot (0-5)
  if (position === undefined) {
    const usedPositions = cellAssignments.map(a => a.position || 0);
    position = 0;
    for (let i = 0; i < CELL_MAX; i++) {
      if (!usedPositions.includes(i)) { position = i; break; }
    }
  }

  state.assignments.push({ id: uid(), personId, day, role, shift, position, subType });
  save(); rerenderCell(day, role); renderPeople();
  return true;
}
function moveAssignment(assignmentId, newPosition) {
  const a = state.assignments.find(x => x.id === assignmentId);
  if (!a) return;
  a.position = newPosition;
  save(); rerenderCell(a.day, a.role);
}
function removeAssignment(aid) {
  const a = state.assignments.find(x => x.id === aid);
  if (!a) return;
  state.assignments = state.assignments.filter(x => x.id !== aid);
  save(); rerenderCell(a.day, a.role); renderPeople();
}
function shakeCell(day, role) {
  const cell = document.querySelector(`.cell[data-day="${day}"][data-role="${role}"]`);
  if (!cell) return;
  cell.classList.remove('shake');
  void cell.offsetWidth;
  cell.classList.add('shake');
}

let drag = null;
const ghost = document.getElementById('drag-ghost');

function attachDrag(el, person) {
  el.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.del')) return;
    if (e.button !== undefined && e.button !== 0) return;
    e.preventDefault();
    startDrag(person, e.clientX, e.clientY, el, null);
  });
}
function attachMiniDrag(el, assignment, person, day, role) {
  el.addEventListener('pointerdown', (e) => {
    if (e.button !== undefined && e.button !== 0) return;
    e.preventDefault();
    startDrag(person, e.clientX, e.clientY, el, assignment, day, role);
  });
}
function startDrag(person, x, y, el, assignment, originDay, originRole) {
  drag = { person, el, assignment, originDay, originRole };
  el.classList.add('dragging');
  ghost.textContent = person.name;
  ghost.style.display = 'block';
  moveGhost(x, y);
  document.addEventListener('pointermove', onDragMove);
  document.addEventListener('pointerup', onDragEnd);
  document.addEventListener('pointercancel', onDragEnd);
}
function moveGhost(x, y) {
  ghost.style.left = x + 'px';
  ghost.style.top = y + 'px';
}
function onDragMove(e) {
  if (!drag) return;
  moveGhost(e.clientX, e.clientY);
  document.querySelectorAll('.cell.drag-over').forEach(c => c.classList.remove('drag-over'));
  document.querySelectorAll('.slot.drop-target').forEach(s => s.classList.remove('drop-target'));

  const target = cellFromPoint(e.clientX, e.clientY);
  if (target) {
    target.classList.add('drag-over');

    // If dragging within same cell, highlight the slot
    if (drag.assignment && drag.originDay !== undefined) {
      const targetDay = parseInt(target.dataset.day, 10);
      const targetRole = parseInt(target.dataset.role, 10);
      if (targetDay === drag.originDay && targetRole === drag.originRole) {
        const slot = slotFromPoint(e.clientX, e.clientY, target);
        if (slot) slot.classList.add('drop-target');
      }
    }
  }
}
function onDragEnd(e) {
  if (!drag) return;
  document.removeEventListener('pointermove', onDragMove);
  document.removeEventListener('pointerup', onDragEnd);
  document.removeEventListener('pointercancel', onDragEnd);
  ghost.style.display = 'none';
  if (drag.el) drag.el.classList.remove('dragging');
  document.querySelectorAll('.cell.drag-over').forEach(c => c.classList.remove('drag-over'));
  document.querySelectorAll('.slot.drop-target').forEach(s => s.classList.remove('drop-target'));

  const target = cellFromPoint(e.clientX, e.clientY);
  const person = drag.person;
  const assignment = drag.assignment;
  const originDay = drag.originDay;
  const originRole = drag.originRole;
  drag = null;

  if (target) {
    const day  = parseInt(target.dataset.day, 10);
    const role = parseInt(target.dataset.role, 10);

    if (assignment && originDay !== undefined && originRole !== undefined) {
      // Moving existing assignment
      if (day === originDay && role === originRole) {
        // Same cell - reorder within cell
        const slot = slotFromPoint(e.clientX, e.clientY, target);
        if (slot && slot.dataset.position !== undefined) {
          const newPos = parseInt(slot.dataset.position, 10);
          moveAssignment(assignment.id, newPos);
        }
        return;
      } else {
        // Different cell - remove and create new
        removeAssignment(assignment.id);
        openPopover(person, day, role, e.clientX, e.clientY);
      }
    } else {
      // New assignment from person card
      openPopover(person, day, role, e.clientX, e.clientY);
    }
  }
}
function cellFromPoint(x, y) {
  const els = document.elementsFromPoint(x, y);
  return els.find(el => el.classList && el.classList.contains('cell'));
}
function slotFromPoint(x, y, cell) {
  const els = document.elementsFromPoint(x, y);
  return els.find(el => el.classList && el.classList.contains('slot') && cell.contains(el));
}

const pop = document.getElementById('popover');
let pending = null;
let selectedShift = null;
let selectedSubType = null;

function openPopover(person, day, role, x, y, position) {
  pending = { personId: person.id, day, role, position };
  selectedShift = null;
  selectedSubType = null;

  // Clear previous selections
  pop.querySelectorAll('button').forEach(b => b.classList.remove('selected'));

  pop.classList.add('show');
  pop.style.left = '0px'; pop.style.top = '0px';
  const rect = pop.getBoundingClientRect();
  const nx = Math.min(Math.max(4, x - rect.width / 2), window.innerWidth  - rect.width  - 4);
  const ny = Math.min(Math.max(4, y + 10),              window.innerHeight - rect.height - 4);
  pop.style.left = nx + 'px';
  pop.style.top  = ny + 'px';
}
function closePopover() {
  pop.classList.remove('show');
  pending = null;
  selectedShift = null;
  selectedSubType = null;
}

pop.addEventListener('click', (e) => {
  const b = e.target.closest('button');
  if (!b) return;

  if (b.dataset.shift) {
    // Shift type selection
    selectedShift = b.dataset.shift;
    pop.querySelectorAll('[data-shift]').forEach(btn => btn.classList.remove('selected'));
    b.classList.add('selected');
  } else if (b.dataset.subtype) {
    // Sub-type selection (toggle)
    if (selectedSubType === b.dataset.subtype) {
      selectedSubType = null;
      b.classList.remove('selected');
    } else {
      selectedSubType = b.dataset.subtype;
      pop.querySelectorAll('[data-subtype]').forEach(btn => btn.classList.remove('selected'));
      b.classList.add('selected');
    }
  } else if (b.id === 'pop-confirm' && pending && selectedShift) {
    // Confirm button
    addAssignment(pending.personId, pending.day, pending.role, selectedShift, pending.position, selectedSubType);
    closePopover();
  }
});
document.addEventListener('pointerdown', (e) => {
  if (pop.classList.contains('show') && !pop.contains(e.target)) closePopover();
}, true);

const modal = document.getElementById('name-modal');
const input = document.getElementById('name-input');
document.getElementById('add-btn').addEventListener('click', () => {
  input.value = '';
  modal.classList.add('show');
  setTimeout(() => input.focus(), 30);
});
document.getElementById('name-cancel').addEventListener('click', () => modal.classList.remove('show'));
document.getElementById('name-ok').addEventListener('click', submitName);
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') submitName();
  else if (e.key === 'Escape') modal.classList.remove('show');
});
modal.addEventListener('click', (e) => {
  if (e.target === modal) modal.classList.remove('show');
});
function submitName() {
  if (!input.value.trim()) return;
  addPerson(input.value);
  modal.classList.remove('show');
}

document.getElementById('clear-all').addEventListener('click', () => {
  if (!confirm('Clear all assignments? (People will remain)')) return;
  state.assignments = [];
  save(); renderPeople(); renderGrid();
});

// Save/Load functionality
document.getElementById('save-btn').addEventListener('click', () => {
  const saveData = btoa(JSON.stringify(state));
  document.getElementById('save-data').value = saveData;
  document.getElementById('save-modal').classList.add('show');
});

document.getElementById('copy-btn').addEventListener('click', () => {
  const textarea = document.getElementById('save-data');
  textarea.select();
  document.execCommand('copy');
  alert('Copied to clipboard! Share this code to load on another device.');
});

document.getElementById('save-close').addEventListener('click', () => {
  document.getElementById('save-modal').classList.remove('show');
});

document.getElementById('load-btn').addEventListener('click', () => {
  const code = prompt('Paste your save code:');
  if (!code) return;
  try {
    const loaded = JSON.parse(atob(code));
    if (loaded && Array.isArray(loaded.people) && Array.isArray(loaded.assignments)) {
      state = loaded;
      save(); renderPeople(); renderGrid();
      alert('Loaded successfully!');
    } else {
      alert('Invalid save code.');
    }
  } catch (e) {
    alert('Error loading save code.');
  }
});

// Download image functionality
document.getElementById('download-btn').addEventListener('click', async () => {
  const peopleDiv = document.getElementById('people');
  const summaryDiv = document.getElementById('text-summary');
  const legendDiv = document.getElementById('legend');

  // Generate text summary
  summaryDiv.innerHTML = '';
  const sortedPeople = [...state.people].sort((a, b) => a.name.localeCompare(b.name));
  for (const p of sortedPeople) {
    const s = statsFor(p.id);
    const item = document.createElement('div');
    item.className = 'summary-item';
    const breakdown = [];
    if (s.allday > 0) breakdown.push(`${s.allday} All Day`);
    if (s.morning > 0) breakdown.push(`${s.morning} Morning`);
    if (s.evening > 0) breakdown.push(`${s.evening} Evening`);
    const breakdownText = breakdown.length > 0 ? ` (${breakdown.join(', ')})` : '';
    item.innerHTML = `<span class="summary-name">${escapeHtml(p.name)}:</span><span class="summary-stats">${s.shifts.toFixed(1)} Shifts${breakdownText} - ${s.hours} Hours</span>`;
    summaryDiv.appendChild(item);
  }

  // Switch to text view
  peopleDiv.style.display = 'none';
  legendDiv.style.display = 'none';
  summaryDiv.classList.add('show');

  // Wait for render
  await new Promise(r => setTimeout(r, 100));

  // Capture screenshot
  try {
    const canvas = await html2canvas(document.getElementById('app'), {
      scale: 3,
      backgroundColor: '#0f1115',
      logging: false
    });

    // Download
    const link = document.createElement('a');
    link.download = `rota-${new Date().toISOString().split('T')[0]}.png`;
    link.href = canvas.toDataURL('image/png');
    link.click();
  } catch (e) {
    alert('Error generating image. Make sure you have html2canvas loaded.');
  }

  // Restore view
  peopleDiv.style.display = '';
  legendDiv.style.display = '';
  summaryDiv.classList.remove('show');
});

document.getElementById('toggle-view').addEventListener('click', () => {
  const app = document.getElementById('app');
  const btn = document.getElementById('toggle-view');
  if (app.classList.contains('view-only')) {
    app.classList.remove('view-only');
    btn.textContent = 'View Rota Only';
  } else {
    app.classList.add('view-only');
    btn.textContent = 'Back to Edit';
  }
});

document.getElementById('sort-select').addEventListener('change', (e) => {
  sortMode = e.target.value;
  renderPeople();
});

load();
renderGrid();
renderPeople();

})();
</script>
